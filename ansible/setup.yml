---
- name: Przygotowanie produkcyjnego VPS (Ubuntu) pod QResto
  hosts: vps
  become: yes

  vars:
    deploy_user: qresto_user
    deploy_ssh_pub_key: "~/.ssh/id_ed25519.pub"
    ssh_port: 22
    initial_ssh_port: "{{ ssh_port }}"
    root_domain: "{{ app_domain }}"
    app_domain: example.com
    app_www_domain: "www.example.com"
    zabbix_domain: "zabbix.example.com"
    ssl_email: "admin@example.com"
    apt_retries: 10
    apt_retry_delay: 30
    apt_lock_timeout: 600

  tasks:
    - name: Ustawienie strefy czasowej
      timezone:
        name: Europe/Warsaw

    - name: Aktualizacja pakietów systemowych
      apt:
        update_cache: yes
        upgrade: dist
        lock_timeout: "{{ apt_lock_timeout }}"
      register: apt_upgrade_result
      retries: "{{ apt_retries }}"
      delay: "{{ apt_retry_delay }}"
      until: apt_upgrade_result is succeeded

    - name: Instalacja pakietów bazowych
      apt:
        name:
          - cron
          - unattended-upgrades
          - fail2ban
          - ca-certificates
          - curl
          - gnupg
          - jq
          - zabbix-sender
        state: present
        lock_timeout: "{{ apt_lock_timeout }}"
      register: apt_base_packages_result
      retries: "{{ apt_retries }}"
      delay: "{{ apt_retry_delay }}"
      until: apt_base_packages_result is succeeded

    - name: Upewnienie się, że cron działa
      service:
        name: cron
        state: started
        enabled: yes

    - name: Sprawdzenie, czy istnieje SWAP
      stat:
        path: /swapfile
      register: swapfile_stat

    - name: Utworzenie SWAP (2GB)
      command: fallocate -l 2G /swapfile
      when: not swapfile_stat.stat.exists

    - name: Uprawnienia dla SWAP
      file:
        path: /swapfile
        mode: '0600'
      when: not swapfile_stat.stat.exists

    - name: Inicjalizacja SWAP
      command: mkswap /swapfile
      when: not swapfile_stat.stat.exists

    - name: Aktywacja SWAP
      command: swapon /swapfile
      when: not swapfile_stat.stat.exists

    - name: Dodanie SWAP do fstab
      mount:
        name: none
        src: /swapfile
        fstype: swap
        opts: sw
        passno: '0'
        dump: '0'
        state: present

    - name: Konfiguracja UFW - dozwolone porty
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "{{ initial_ssh_port }}"
        - "{{ ssh_port }}"
        - "80"
        - "443"

    - name: Włączenie UFW
      ufw:
        state: enabled

    - name: Włączenie fail2ban
      service:
        name: fail2ban
        state: started
        enabled: yes

    - name: Limit logów journald
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?SystemMaxUse='
        line: 'SystemMaxUse=100M'
      notify: Restart Journald

    - name: Katalog na klucze APT Dockera
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Pobranie klucza GPG Dockera
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: yes

    - name: Dodanie repozytorium Dockera
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Instalacja Docker Engine i Docker Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes
        lock_timeout: "{{ apt_lock_timeout }}"
      register: apt_docker_packages_result
      retries: "{{ apt_retries }}"
      delay: "{{ apt_retry_delay }}"
      until: apt_docker_packages_result is succeeded

    - name: Utworzenie użytkownika deploy
      user:
        name: "{{ deploy_user }}"
        shell: /bin/bash
        create_home: yes
        groups: docker
        append: yes
        state: present

    - name: Konfiguracja bezhasłowego sudo dla użytkownika deploy
      copy:
        content: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL"
        dest: "/etc/sudoers.d/{{ deploy_user }}"
        mode: '0440'
        validate: 'visudo -cf %s'

    - name: Kopiowanie klucza publicznego do użytkownika deploy
      authorized_key:
        user: "{{ deploy_user }}"
        state: present
        key: "{{ lookup('file', deploy_ssh_pub_key) }}"

    - name: Utworzenie katalogu aplikacji
      file:
        path: /opt/qresto
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0755'

    - name: Utworzenie katalogu certyfikatów Traefik
      file:
        path: /opt/qresto/letsencrypt
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0755'

    - name: Inicjalizacja acme.json
      copy:
        content: ""
        dest: /opt/qresto/letsencrypt/acme.json
        force: no
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0600'

    - name: Skopiuj pełny szablon .env.example jako .env.bootstrap
      copy:
        src: ../.env.example
        dest: /opt/qresto/.env.bootstrap
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0640'

    - name: Normalizacja .env.bootstrap (LF i brak BOM)
      shell: |
        sed -i 's/\r$//' /opt/qresto/.env.bootstrap
        sed -i '1s/^\xEF\xBB\xBF//' /opt/qresto/.env.bootstrap
      args:
        executable: /bin/bash

    - name: Uzupełnij domeny i e-mail SSL w .env.bootstrap
      lineinfile:
        path: /opt/qresto/.env.bootstrap
        regexp: '^{{ item.key }}='
        line: '{{ item.key }}={{ item.value }}'
      loop:
        - { key: 'ROOT_DOMAIN', value: '{{ root_domain }}' }
        - { key: 'APP_DOMAIN', value: '{{ app_domain }}' }
        - { key: 'APP_WWW_DOMAIN', value: '{{ app_www_domain }}' }
        - { key: 'ZABBIX_DOMAIN', value: '{{ zabbix_domain }}' }
        - { key: 'SSL_EMAIL', value: '{{ ssl_email }}' }
        - { key: 'APP_REPLICAS', value: '1' }

    - name: Utworzenie katalogu logów monitoringu lokalnego
      file:
        path: /var/log/qresto
        state: directory
        mode: '0755'

    - name: Instalacja skryptu lokalnego monitoringu endpointu /health
      copy:
        dest: /usr/local/bin/qresto-healthcheck.sh
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          URL="https://{{ app_domain }}/health"
          TS="$(date -Iseconds)"

          if curl -fsS --max-time 8 "$URL" >/dev/null; then
            echo "$TS OK $URL" >> /var/log/qresto/healthcheck.log
          else
            echo "$TS ERROR $URL" >> /var/log/qresto/healthcheck.log
            exit 1
          fi

    - name: Cron monitoringu aplikacji (co 5 minut)
      cron:
        name: "QResto - healthcheck aplikacji"
        minute: "*/5"
        user: root
        job: "/usr/local/bin/qresto-healthcheck.sh"

    - name: Cron backupu środowiska (codziennie 03:30)
      cron:
        name: "QResto - backup docker compose i .env"
        minute: "30"
        hour: "3"
        user: root
        job: "[ -f /opt/qresto/scripts/backup.sh ] && /bin/bash /opt/qresto/scripts/backup.sh >> /var/log/qresto/backup.log 2>&1"

    - name: Cron push metryki certyfikatu do Zabbix (co 30 minut)
      cron:
        name: "QResto - cert days left to Zabbix"
        minute: "*/30"
        user: root
        job: "[ -f /opt/qresto/scripts/push-cert-metric.sh ] && /bin/bash /opt/qresto/scripts/push-cert-metric.sh >> /var/log/qresto/cert-metric.log 2>&1"

    - name: Cron auto-bootstrap Zabbix (jednorazowo po gotowości stacku)
      cron:
        name: "QResto - auto bootstrap Zabbix"
        minute: "*/3"
        user: root
        job: "[ -f /opt/qresto/.env ] && [ -f /opt/qresto/scripts/bootstrap-zabbix.sh ] && [ ! -f /opt/qresto/.zabbix_bootstrap_done ] && /bin/bash /opt/qresto/scripts/bootstrap-zabbix.sh >> /var/log/qresto/zabbix-bootstrap.log 2>&1 && touch /opt/qresto/.zabbix_bootstrap_done"

    - name: Upewnienie się, że sshd ładuje pliki drop-in
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Include\s+/etc/ssh/sshd_config\.d/\*\.conf'
        line: 'Include /etc/ssh/sshd_config.d/*.conf'
        insertbefore: BOF
      notify: Restart SSH

    - name: Wymuszenie portu SSH w głównym sshd_config
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Port\s+'
        line: 'Port {{ ssh_port }}'
        insertbefore: '^Include\s+/etc/ssh/sshd_config\.d/\*\.conf'
      notify: Restart SSH

    - name: Wymuszenie polityki SSH w pliku drop-in
      copy:
        dest: /etc/ssh/sshd_config.d/00-qresto-hardening.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          PermitRootLogin no
          PasswordAuthentication no
      notify: Restart SSH

    - name: Zebranie informacji o usługach systemowych
      service_facts:

    - name: Wylaczenie socket activation SSH dla niestandardowego portu
      systemd:
        name: ssh.socket
        enabled: false
        state: stopped
        masked: true
      when:
        - "'ssh.socket' in ansible_facts.services"
        - (ssh_port | int) != 22

    - name: Odmaskowanie ssh.socket dla domyslnego portu 22
      systemd:
        name: ssh.socket
        masked: false
      when:
        - "'ssh.socket' in ansible_facts.services"
        - (ssh_port | int) == 22

    - name: Wlaczenie klasycznej uslugi SSH
      systemd:
        name: ssh
        enabled: true
        state: started

    - name: Walidacja pełnej konfiguracji SSH
      command: /usr/sbin/sshd -t
      changed_when: false

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted

    - name: Restart Journald
      service:
        name: systemd-journald
        state: restarted
