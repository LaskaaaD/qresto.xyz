name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qresto-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate application and infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Run validation suite
        run: bash scripts/validate.sh

      - name: Install Ansible tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Validate Ansible syntax
        run: ansible-playbook --syntax-check -i ansible/inventories/prod/hosts.example.yml ansible/setup.yml

  container-build:
    name: Build container image for pull request
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build image without publishing
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: false
          tags: qresto:pr-${{ github.event.pull_request.number }}

  build:
    name: Build and publish container image
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_repo: ${{ steps.image.outputs.image_repo }}
      image_sha: ${{ steps.image.outputs.image_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image_repo="${GITHUB_REPOSITORY,,}"
          image_sha="${REGISTRY}/${image_repo}:${GITHUB_SHA}"
          {
            echo "image_repo=${image_repo}"
            echo "image_sha=${image_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image_sha }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_repo }}:main
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy production
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        env:
          APP_IMAGE: ${{ needs.build.outputs.image_sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_IMAGE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail

            cd /opt/qresto
            if [ ! -d .git ]; then
              git init
              git remote add origin "https://github.com/${{ github.repository }}.git"
            fi
            git remote set-url origin "https://github.com/${{ github.repository }}.git"
            git fetch --prune origin main
            git checkout -B main origin/main
            git reset --hard origin/main

            mkdir -p letsencrypt
            touch letsencrypt/acme.json
            chmod 600 letsencrypt/acme.json

            if grep -q '^APP_IMAGE=' .env; then
              sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${APP_IMAGE}|" .env
            else
              echo "APP_IMAGE=${APP_IMAGE}" >> .env
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose --env-file .env pull app
            docker compose --env-file .env up -d --remove-orphans
            docker compose --env-file .env ps
